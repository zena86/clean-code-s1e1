<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen">
  </head>
  <body class="body">
    <header class="hero">
      <img class="hero__pic" src="./eisenhower-matrix.jpg" alt="the Eisenhower Matrix">
      <a class="hero__more" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="fundamental">
      <section class="task-add">
        <h3 class="task-add__title title">Add Item</h3>
        <div class="task-add__wrapper">
          <input id="new-task" class="task-add__text task-text" type="text">
          <button class="task-add__btn btn">Add</button>
        </div>
      </section>
      <h3 class="title">Todo</h3>
      <ul id="incompleted-task" class="task-todo">
        <li class="task-todo__item task-item">
          <input type="checkbox" class="task-item__check">
          <label class="task-item__text task-text">Pay Bills</label>
          <input type="text" class="task-item__enter">
          <button class="task-item__edit btn">Edit</button>
          <button class="task-item__delete delete btn"><img class="delete__pic" src="./remove.svg" alt="delete"></button>
        </li>
        <li class="task-todo__item task-item edit-mode">
          <input type="checkbox" class="task-item__check">
          <label class="task-item__text task-text">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task-item__enter task-text">
          <button class="task-item__edit btn">Save</button>
          <button class="task-item__delete delete btn"><img class="delete__pic" src="./remove.svg" alt="delete"></button>
        </li>
      </ul>
      <h3 class="title">Completed</h3>
      <ul id="completed-task" class="task-completed">
        <li class="task-item">
          <input type="checkbox" class="task-item__check" checked>
          <label class="task-item__text task-text complete">See the Doctor</label>
          <input type="text" class="task-item__enter task-text">
          <button class="task-item__edit btn">Edit</button>
          <button class="task-item__delete delete btn"><img class="delete__pic" src="./remove.svg" alt="delete"></button>
        </li>
      </ul>
    </main>
    <script src="app.js"></script>
  </body>
</html>
